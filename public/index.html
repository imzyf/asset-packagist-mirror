<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>asset-packagist-mirror</title>
  <style>
    :root { color-scheme: light; }
    body {
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 760px; margin: 3rem auto; padding: 0 1.2rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: .2rem; }
    .sub { color: #888; margin-top: 0; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    pre {
      background: #1113; padding: 1rem; border-radius: 8px; overflow-x: auto;
      font-size: 13px;
    }
    ul.pkgs { list-style: none; padding: 0; }
    ul.pkgs li { padding: .35rem 0; border-bottom: 1px solid #8884; }
    ul.pkgs a { text-decoration: none; }
    .hash { color: #888; font-size: 12px; }
    footer { margin-top: 2.5rem; color: #888; font-size: 13px; }
  </style>
</head>
<body>
  <h1>asset-packagist-mirror</h1>
  <p class="sub">A tiny mirror of <a href="https://asset-packagist.org">asset-packagist.org</a> for the few <code>bower-asset/*</code> packages a Yii2 project actually uses.</p>

  <h2>Use it</h2>
  <p>Add this to your project's <code>composer.json</code>:</p>
  <pre id="composer">loading…</pre>

  <h2>Mirrored packages</h2>
  <ul class="pkgs" id="pkgs"><li>loading…</li></ul>

  <footer>
    Sync with <code>make sync</code> ·
    <a href="https://github.com/imzyf/asset-packagist-mirror">source</a>
  </footer>

  <script>
    // The composer repository URL is this page's directory (works on GitHub raw or nginx).
    const repoUrl = new URL('.', location.href).href;

    document.getElementById('composer').textContent = JSON.stringify({
      repositories: [
        { type: 'composer', url: repoUrl, only: ['bower-asset/*', 'npm-asset/*'] }
      ]
    }, null, 4);

    fetch('packages.json')
      .then(r => r.json())
      .then(data => {
        const providers = data.providers || {};
        const ul = document.getElementById('pkgs');
        ul.innerHTML = '';
        Object.keys(providers).sort().forEach(name => {
          const hash = providers[name].sha256 || '';
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = (data['providers-url'] || '/p/%package%/%hash%.json')
            .replace('%package%', name).replace('%hash%', hash);
          a.textContent = name;
          li.appendChild(a);
          li.insertAdjacentHTML('beforeend',
            ' <span class="hash">' + hash.slice(0, 12) + '…</span>');
          ul.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('pkgs').innerHTML = '<li>could not load packages.json</li>';
      });
  </script>
</body>
</html>
